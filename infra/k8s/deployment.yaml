apiVersion: apps/v1
kind: Deployment
metadata:
  name: sourcedeck-api
  labels:
    app: sourcedeck-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sourcedeck-api
  template:
    metadata:
      labels:
        app: sourcedeck-api
    spec:
      serviceAccountName: sourcedeck-api
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          # Replace with your registry path (e.g. icr.io/<namespace>/sourcedeck-api:<tag>)
          image: ghcr.io/CHANGE-ME/sourcedeck-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: sourcedeck-config
            - secretRef:
                name: sourcedeck-secrets
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          livenessProbe:
            httpGet: { path: /health/live,  port: http }
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /health/ready, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: /app/.data
      volumes:
        - name: tmp
          emptyDir: {}
        - name: data
          emptyDir: {}
